<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Siêu Đa Năng</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background-color: #f0f2f5; color: #1c1e21; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1877f2; font-size: 26px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #606770; font-size: 14px; margin-bottom: 25px; }
        .upload-area { border: 2px dashed #1877f2; padding: 40px 20px; text-align: center; border-radius: 10px; background: #e7f3ff; margin-bottom: 20px; transition: all 0.3s;}
        .upload-area:hover { background: #d8ebff; }
        .btn { background-color: #1877f2; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 15px; transition: background 0.2s;}
        .btn:hover { background-color: #166fe5; }
        .option-label { display: block; background: #f8f9fa; padding: 15px; margin: 12px 0; border-radius: 8px; cursor: pointer; border: 1px solid #ced4da; transition: all 0.2s; font-size: 16px;}
        .option-label:hover { background: #e9ecef; border-color: #adb5bd; }
        .correct { background: #31a24c !important; color: white; border-color: #2b9244; }
        .wrong { background: #e41e3f !important; color: white; border-color: #cc1a38; }
        #quizSection, #resultSection { display: none; }
        .status { text-align: center; color: #606770; margin-top: 15px; font-size: 14px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <h1>Tạo Quiz Trắc Nghiệm Đa Năng</h1>
    <p class="subtitle">Hỗ trợ nhận diện cả Bảng (Table) và Văn bản thô từ Word (.docx)</p>
    
    <div id="uploadSection" class="upload-area">
        <p style="font-size: 16px; margin-bottom: 15px;">Chọn file <b>.docx</b> hoặc <b>.csv</b> của bạn:</p>
        <input type="file" id="dataFile" accept=".docx, .csv, .txt" style="font-size: 15px;">
        <button class="btn" onclick="processFile()">🚀 Đọc File & Bắt Đầu</button>
        <div id="loadingStatus" class="status"></div>
    </div>

    <div id="quizSection">
        <p style="color: #606770; font-weight: bold; font-size: 15px;">Câu hỏi <span id="currentQNum"></span> / <span id="totalQ"></span></p>
        <h3 id="questionText" style="line-height: 1.6; color: #1c1e21; font-size: 20px;"></h3>
        <div id="optionsContainer"></div>
        <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none; margin-top: 25px;">Câu tiếp theo ➔</button>
    </div>

    <div id="resultSection" style="text-align: center;">
        <h2 style="font-size: 36px; color: #31a24c; margin-bottom: 10px;">Hoàn Thành! 🎉</h2>
        <p style="font-size: 22px; color: #1c1e21;">Bạn đã trả lời đúng: <b id="scoreText" style="color: #1877f2;"></b></p>
        <button class="btn" onclick="location.reload()" style="margin-top: 30px;">Làm lại bài khác ↻</button>
    </div>
</div>

<script>
    let quizData = [];
    let currentQuestionIndex = 0;
    let score = 0;

    // HÀM CHÍNH: XỬ LÝ FILE ĐA NĂNG
    function processFile() {
        const fileInput = document.getElementById('dataFile').files[0];
        const statusEl = document.getElementById('loadingStatus');
        
        if (!fileInput) { alert("Bạn chưa chọn file kìa!"); return; }

        statusEl.innerText = "⏳ Đang quét và phân tích dữ liệu...";
        const fileName = fileInput.name.toLowerCase();

        if (fileName.endsWith('.csv') || fileName.endsWith('.txt')) {
            Papa.parse(fileInput, {
                header: true, skipEmptyLines: true,
                complete: function(results) { 
                    let extracted = processTableData(results.data);
                    if (extracted.length > 0) startQuiz(extracted);
                    else { statusEl.innerText = ""; alert("Lỗi cấu trúc file CSV!"); }
                }
            });
        } 
        else if (fileName.endsWith('.docx')) {
            const reader = new FileReader();
            reader.onload = function(event) {
                // ƯU TIÊN 1: Thử đọc theo cấu trúc Bảng (áp dụng cho file đáp án kns)
                mammoth.convertToHtml({arrayBuffer: event.target.result})
                    .then(function(result) {
                        const tableData = parseHtmlTableToArray(result.value);
                        let extracted = processTableData(tableData);
                        
                        if (extracted.length > 0) {
                            startQuiz(extracted); // Thành công chế độ Bảng!
                        } else {
                            // ƯU TIÊN 2: Nếu không có bảng, chuyển sang chế độ đọc Văn bản thô (áp dụng cho file trắc nghiệm mới)
                            mammoth.extractRawText({arrayBuffer: event.target.result})
                                .then(function(textResult) {
                                    let textData = processTextData(textResult.value);
                                    if (textData.length > 0) {
                                        startQuiz(textData); // Thành công chế độ Văn bản!
                                    } else {
                                        statusEl.innerText = "";
                                        alert("Không nhận diện được câu hỏi! Hãy đảm bảo file Word gõ đúng chuẩn: Câu 1... A... B... C... D...");
                                    }
                                });
                        }
                    })
                    .catch(function(err) {
                        statusEl.innerText = ""; alert("Lỗi đọc file Word!"); console.error(err);
                    });
            };
            reader.readAsArrayBuffer(fileInput);
        } else { alert("Chỉ hỗ trợ .docx và .csv"); }
    }

    // BỘ LỌC 1: XỬ LÝ DỮ LIỆU DẠNG BẢNG
    function processTableData(rawData) {
        let validRows = rawData.filter(row => {
            let qKey = Object.keys(row).find(k => k.toLowerCase().includes('questioncontent') || k.toLowerCase().includes('câu hỏi'));
            let aKey = Object.keys(row).find(k => k.toLowerCase().includes('resultanswer') || k.toLowerCase().includes('đáp án'));
            if (qKey && aKey && row[qKey] && row[aKey] && row[qKey].trim() !== '') {
                row.QuestionContent = row[qKey]; row.ResultAnswer = row[aKey]; return true;
            }
            return false;
        });

        if (validRows.length === 0) return [];

        let results = [];
        validRows.forEach(row => {
            let a = row.ResultAnswer.trim();
            let choices = [a];
            let attempts = 0;
            // Tự sinh 3 đáp án nhiễu từ các câu khác
            while(choices.length < 4 && choices.length < validRows.length && attempts < 100) {
                let rnd = validRows[Math.floor(Math.random() * validRows.length)].ResultAnswer.trim();
                if(!choices.includes(rnd) && rnd !== '') choices.push(rnd);
                attempts++;
            }
            choices.sort(() => Math.random() - 0.5);
            results.push({ question: row.QuestionContent, options: choices, correctAnswer: a });
        });
        return results;
    }

    // BỘ LỌC 2: XỬ LÝ DỮ LIỆU DẠNG VĂN BẢN THÔ (DÀNH CHO FILE MỚI)
    function processTextData(text) {
        let results = [];
        // Cắt chữ mỗi khi gặp "Câu 1:", "Câu 2."
        let blocks = text.split(/(?=Câu\s*\d+\s*[:\.])/i);
        
        blocks.forEach(block => {
            block = block.trim();
            if (!block.toLowerCase().startsWith('câu')) return;

            // Cắt lấy câu hỏi và các lựa chọn A, B, C, D
            let parts = block.split(/(?=[a-e][\.\)]\s)/i);
            if (parts.length >= 2) { 
                let qText = parts[0].replace(/Câu\s*\d+\s*[:\.]/i, '').trim();
                let options = [];
                let correctAns = "";

                for (let i = 1; i < parts.length; i++) {
                    let optText = parts[i].trim();
                    let isCorrect = false;

                    // Nhận diện đáp án đúng nhờ chữ "đáp án" dính kèm
                    if (optText.toLowerCase().includes('đáp án')) {
                        isCorrect = true;
                        optText = optText.replace(/đáp án/gi, '').trim(); 
                    }
                    
                    optText = optText.replace(/^[a-e][\.\)]\s*/i, '').trim(); // Gọt bỏ chữ A. B. C.

                    if (optText !== '') {
                        options.push(optText);
                        if (isCorrect) correctAns = optText;
                    }
                }

                // Nếu bạn quên ghi chữ 'đáp án', nó mặc định lấy câu đầu để web không bị treo
                if (correctAns === "" && options.length > 0) correctAns = options[0];

                if (options.length > 0) {
                    results.push({ question: qText, options: options, correctAnswer: correctAns });
                }
            }
        });
        return results;
    }

    // Tiện ích bóc tách bảng HTML
    function parseHtmlTableToArray(htmlStr) {
        let parser = new DOMParser(); let doc = parser.parseFromString(htmlStr, 'text/html');
        let table = doc.querySelector('table'); if (!table) return [];
        let data = []; let rows = table.querySelectorAll('tr'); if (rows.length < 2) return [];
        let headers = []; rows[0].querySelectorAll('th, td').forEach(c => headers.push(c.textContent.trim()));
        for (let i = 1; i < rows.length; i++) {
            let cells = rows[i].querySelectorAll('td'); let rowObj = {};
            cells.forEach((cell, idx) => { if (headers[idx]) rowObj[headers[idx]] = cell.textContent.trim(); });
            data.push(rowObj);
        }
        return data;
    }

    // KHỞI ĐỘNG QUIZ
    function startQuiz(data) {
        quizData = data;
        quizData.sort(() => Math.random() - 0.5); // Trộn ngân hàng câu hỏi
        
        document.getElementById('uploadSection').style.display = 'none';
        document.getElementById('quizSection').style.display = 'block';
        document.getElementById('totalQ').innerText = quizData.length;
        
        currentQuestionIndex = 0; score = 0;
        loadQuestion();
    }

    // Nạp câu hỏi ra màn hình
    function loadQuestion() {
        const qData = quizData[currentQuestionIndex];
        document.getElementById('currentQNum').innerText = currentQuestionIndex + 1;
        document.getElementById('questionText').innerText = qData.question;
        
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        document.getElementById('nextBtn').style.display = 'none';

        const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
        qData.options.forEach((choice, index) => {
            let labelDiv = document.createElement('label');
            labelDiv.className = 'option-label';
            labelDiv.innerHTML = `<input type="radio" name="answer" style="margin-right: 12px; transform: scale(1.2);"> <b>${labels[index] || '-'}.</b> ${choice}`;
            labelDiv.onclick = () => checkAnswer(choice, qData.correctAnswer);
            optionsContainer.appendChild(labelDiv);
        });
    }

    // Xử lý đúng sai
    function checkAnswer(selected, correct) {
        const labels = document.querySelectorAll('.option-label');
        labels.forEach(lbl => {
            lbl.style.pointerEvents = 'none'; 
            let answerText = lbl.innerText.substring(3).trim(); 
            if (answerText === correct.trim()) lbl.classList.add('correct');
            else if (answerText === selected.trim()) lbl.classList.add('wrong');
        });

        if (selected.trim() === correct.trim()) score++;
        document.getElementById('nextBtn').style.display = 'block';
    }

    // Chuyển trang
    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) loadQuestion();
        else {
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('scoreText').innerText = `${score} / ${quizData.length}`;
        }
    }
</script>

</body>
</html>
