<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Siêu Cấp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 650px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .upload-area { border: 2px dashed #3498db; padding: 30px; text-align: center; border-radius: 8px; background: #ebf5fb; margin-bottom: 20px; }
        .btn { background-color: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 15px; transition: 0.2s;}
        .btn:hover { background-color: #2980b9; }
        .option-label { display: block; background: #f8f9fa; padding: 12px; margin: 10px 0; border-radius: 8px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        .option-label:hover { background: #e9ecef; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        #quizSection, #resultSection { display: none; }
        .status { text-align: center; color: #7f8c8d; font-style: italic; margin-top: 10px; font-size: 14px;}
    </style>
</head>
<body>

<div class="container">
    <h1>Tạo Quiz Tự Động</h1>
    
    <div id="uploadSection" class="upload-area">
        <p>Chọn file <b>.docx</b> hoặc <b>.csv</b> chứa dữ liệu của bạn:</p>
        <input type="file" id="wordFile" accept=".docx, .csv, .txt">
        <button class="btn" onclick="processFile()">Bắt đầu tạo Quiz</button>
        <div id="loadingStatus" class="status"></div>
    </div>

    <div id="quizSection">
        <p style="color: #7f8c8d; font-weight: bold;">Câu hỏi <span id="currentQNum"></span> / <span id="totalQ"></span></p>
        <h3 id="questionText" style="line-height: 1.5; color: #2c3e50;"></h3>
        <div id="optionsContainer"></div>
        <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Câu tiếp theo</button>
    </div>

    <div id="resultSection" style="text-align: center;">
        <h2 style="font-size: 32px; color: #2ecc71;">Tuyệt vời! Bạn đã hoàn thành.</h2>
        <p style="font-size: 20px;">Điểm số: <b id="scoreText"></b></p>
        <button class="btn" onclick="location.reload()">Chơi lại từ đầu</button>
    </div>
</div>

<script>
    let questionsData = [];
    let currentQuestionIndex = 0;
    let score = 0;

    // Xử lý file đa năng
    function processFile() {
        const fileInput = document.getElementById('wordFile').files[0];
        const statusEl = document.getElementById('loadingStatus');
        
        if (!fileInput) {
            alert("Bạn chưa chọn file kìa!");
            return;
        }

        statusEl.innerText = "Đang đọc và xử lý dữ liệu...";
        const fileName = fileInput.name.toLowerCase();

        // Ưu tiên 1: Nếu người dùng chọn tải file CSV
        if (fileName.endsWith('.csv') || fileName.endsWith('.txt')) {
            Papa.parse(fileInput, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processData(results.data);
                },
                error: function() { 
                    alert("Lỗi đọc file CSV!"); 
                    statusEl.innerText = ""; 
                }
            });
        } 
        // Ưu tiên 2: Nếu người dùng tải file Word
        else if (fileName.endsWith('.docx')) {
            const reader = new FileReader();
            reader.onload = function(event) {
                mammoth.extractRawText({arrayBuffer: event.target.result})
                    .then(function(result) {
                        // Sửa lỗi ngớ ngẩn của Word: Tự biến ngoặc kép thẳng thành ngoặc kép cong
                        let text = result.value.replace(/[“”]/g, '"');
                        Papa.parse(text, {
                            header: true,
                            skipEmptyLines: true,
                            complete: function(results) {
                                processData(results.data);
                            }
                        });
                    })
                    .catch(function(err) {
                        alert("Lỗi không thể đọc file Word. File có thể bị hỏng.");
                        statusEl.innerText = "";
                        console.error(err);
                    });
            };
            reader.readAsArrayBuffer(fileInput);
        } else {
            alert("Hệ thống chỉ hỗ trợ file .docx hoặc .csv!");
            statusEl.innerText = "";
        }
    }

    // Hàm xử lý dữ liệu sau khi phân tích
    function processData(rawData) {
        const statusEl = document.getElementById('loadingStatus');

        // Bóc tách dữ liệu thông minh, bỏ qua lỗi khoảng trắng thừa ở tiêu đề
        questionsData = rawData.filter(row => {
            let qKey = Object.keys(row).find(k => k.trim().toLowerCase() === 'questioncontent');
            let aKey = Object.keys(row).find(k => k.trim().toLowerCase() === 'resultanswer');

            if (qKey && aKey && row[qKey] && row[aKey] && row[qKey].trim() !== '') {
                row.QuestionContent = row[qKey];
                row.ResultAnswer = row[aKey];
                return true;
            }
            return false;
        });

        if (questionsData.length === 0) {
            statusEl.innerText = "";
            alert("Không tìm thấy dữ liệu hợp lệ! Mẹo: Nếu file Word cứ báo lỗi, hãy Save As nó thành file .CSV rồi tải lên, đảm bảo 100% ăn ngay.");
            return;
        }

        // Trộn ngẫu nhiên câu hỏi
        questionsData.sort(() => Math.random() - 0.5);

        document.getElementById('uploadSection').style.display = 'none';
        document.getElementById('quizSection').style.display = 'block';
        document.getElementById('totalQ').innerText = questionsData.length;
        
        loadQuestion();
    }

    // Hiển thị câu hỏi lên màn hình
    function loadQuestion() {
        const qData = questionsData[currentQuestionIndex];
        document.getElementById('currentQNum').innerText = currentQuestionIndex + 1;
        document.getElementById('questionText').innerText = qData.QuestionContent;
        
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        document.getElementById('nextBtn').style.display = 'none';

        // Lấy đáp án đúng và làm sạch khoảng trắng
        let correctAns = qData.ResultAnswer.trim();
        let choices = [correctAns];

        // Lấy 3 đáp án ngẫu nhiên làm nhiễu
        while (choices.length < 4 && choices.length < questionsData.length) {
            let randomRow = questionsData[Math.floor(Math.random() * questionsData.length)];
            let randomAns = randomRow.ResultAnswer.trim();
            if (!choices.includes(randomAns) && randomAns !== '') {
                choices.push(randomAns);
            }
        }
        
        // Đảo lộn vị trí
        choices.sort(() => Math.random() - 0.5);

        // Hiển thị ra các nút A, B, C, D
        const labels = ['A', 'B', 'C', 'D'];
        choices.forEach((choice, index) => {
            let labelDiv = document.createElement('label');
            labelDiv.className = 'option-label';
            labelDiv.innerHTML = `<input type="radio" name="answer" style="margin-right: 10px;"> <b>${labels[index]}.</b> ${choice}`;
            labelDiv.onclick = () => checkAnswer(choice, correctAns);
            optionsContainer.appendChild(labelDiv);
        });
    }

    // Kiểm tra đúng sai
    function checkAnswer(selected, correct) {
        const labels = document.querySelectorAll('.option-label');
        labels.forEach(lbl => {
            lbl.style.pointerEvents = 'none'; 
            let answerText = lbl.innerText.substring(3).trim(); 
            
            if (answerText === correct.trim()) {
                lbl.classList.add('correct');
            } else if (answerText === selected.trim()) {
                lbl.classList.add('wrong');
            }
        });

        if (selected.trim() === correct.trim()) score++;
        
        document.getElementById('nextBtn').style.display = 'block';
    }

    // Chuyển câu
    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questionsData.length) {
            loadQuestion();
        } else {
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('scoreText').innerText = `${score} / ${questionsData.length}`;
        }
    }
</script>

</body>
</html>
